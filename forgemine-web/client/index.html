            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "¿Qué certificaciones tienen para soldadura de baldes mineros?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Contamos con certificación AWS D1.1 para soldadura estructural, ISO 9001 para gestión de calidad e ISO 3834-2 para soldadura por fusión. Todos nuestros soldadores están calificados y certificados según normas internacionales."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tiempo toma la reparación integral de un balde minero?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El tiempo depende del alcance: reparación de fisuras (5-10 días), blindaje parcial (15-20 días), overhaul completo con blindaje heavy duty (30-45 días). Ofrecemos servicio de emergencia 24/7 para garantizar la disponibilidad operacional de su flota."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es el blindaje de baldes mineros?",
          "acceptedAnswer": {
            "@type": "Answer",

        }
